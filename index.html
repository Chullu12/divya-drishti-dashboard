    <title>divya-drishti-project</title>
    <style>
  /* 🎙️ This creates the pulsing "Siri-style" effect for your Voice AI */
  @keyframes pulse {
    0% {
      transform: scale(1);
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
    }
    70% {
      transform: scale(1.1);
      box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
    }
    100% {
      transform: scale(1);
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
    }
  }

  /* Smooth fade-in for the dashboard cards */
  body {
    background-color: #f8fafc;
    margin: 0;
    transition: all 0.5s ease;
  }
</style>
